version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ezstore
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ezstore
    ports:
      - "5432:5432"
    volumes:
      - ezstore-db-data:/var/lib/postgresql/data

volumes:
  ezstore-db-data:
